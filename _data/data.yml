career-profile:
  title: Career Profile
  summary: |
    Scientific Computing Engineer with 15+ years of experience in bioinformatics, structural biology, and computational research. Expertise in designing and implementing full-stack scientific software solutions, open research data infrastructure, and large-scale computing systems. Passionate about open science, community-driven development, and enabling researchers through robust tools and data management systems. Strong background in algorithm development, software architecture, and cross-functional team leadership.

