experiences:
  title: Experiences
  info:
  - role: Scientific Computing Engineer
    time: 2018 - Present
    company: Scientific Data Curation, Paul Scherrer Institute, Switzerland
    details: |
      - Project coordinator for OpenEM (openem.ch). Created an open research data (ORD) infrastructure for Swiss electron microscopy facilities. Wrote ETH and swissuniversities grants leading to 2.4 million CHF, then led a distributed team of 7 developers implementing the infrastructure.
      - Represented PSI in ORD committees and consortiums. (ETH-ORD Expert Group for Services and Infrastructure; ETH Research Data Services Explorer Steering Committee)
      - Scientific software projects, including full-stack web apps, high-performance computing, and devops deployment. (Typescript, Python, Go, C++, ansible, kubernetes)
      - Created data collection and processing pipelines for the PSI electron microscopy facility. (Slurm, relion, cryoSPARC, hardware purchasing and installation, network configuration)

  - role: Postdoctoral Researcher
    time: 2017 - 2018
    company: Zurich University of Applied Science, Switzerland
    details: |
      _Advisor:_ Prof. Maria Anisimova.
      Focused on phylogenetic methods for tandem repeat proteins, including software development and benchmarking. Developed novel methods for the [Tandem Repeat(https://github.com/acg-team/tral) and applied these systematically to the Armadillo Repeat protein family. (Python, slurm)
  - role: NIH Postdoctoral Fellow
    time: 2015 - 2017
    company: National Institutes of Health, Bethesda, MD
    details: |
      _Advisors:_ Prof. Philip Bourne (NIH) and Dr. Guido Capitani (PSI)
      Analysis of protein-protein interactions in crystal structures as part of the [EPPIC](https://www.eppic-web.org), the Evolutionary Protein Protein Interface Classifier. (Java, Javascript, NGL, vis.js)
  - role: PhD in Bioinformatics
    company: University of California, San Diego
    time: 2009-2015
    details: |
      _Advisor:_ Prof. Philip Bourne.
      _Thesis:_ [Structure-Preserving Rearrangements: Algorithms for Structural Comparison and Protein Analysis](https://www.proquest.com/openview/66848a5f702b91ce5b7b43f2356bcde1/1?pq-origsite=gscholar&cbl=18750)
      Structural comparison algorithms for proteins, including [CE-Symm](https://github.com/rcsb/symmetry/) for detecting internal pseudosymmetry. These were deployed on the [RCSB Protein Data Bank](https://www.rcsb.org), as well as applied systematically across the PDB. (Java, Open Science Cloud, BioJava core developer, Open Bioinformatics Foundation member)
  - role: Lab Intern
    time: 2008
    company: ETH Zürich
    details: |
      _Advisor:_ Prof. Donald Hilvert
  - role: Undergraduate Researcher
    time: 2007
    company: Seattle Children's Hospital/U. Washington Dept. Biomedical and Health Informatics
    details: |
      Advisor:_ Dr. Eugene Kolker
  - role: Software Intern
    time: 2006 - 2007
    company: Exbiblio

